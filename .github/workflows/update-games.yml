name: Update PS Plus games list

on:
  schedule:
    # Runs daily at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-games
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Fetch games data
        run: node scripts/fetch-games.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first so newly-created (untracked) files are detected too;
          # `git diff` alone ignores untracked files and would miss the first run.
          git add data README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PS Plus games list ($(date -u +%Y-%m-%d))"
          git push
