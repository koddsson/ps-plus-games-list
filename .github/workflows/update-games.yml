name: Update PS Plus games list

on:
  schedule:
    # Runs daily at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Send a sample Discord notification instead of syncing"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-games
  cancel-in-progress: false

jobs:
  update:
    if: ${{ !inputs.test_notification }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Fetch games data
        run: node scripts/fetch-games.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage first so newly-created (untracked) files are detected too;
          # `git diff` alone ignores untracked files and would miss the first run.
          git add data README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update PS Plus games list ($(date -u +%Y-%m-%d))"
          git push

      - name: Notify Discord of changes
        if: ${{ hashFiles('discord-payload.json') != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping notification."
            exit 0
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            -d @discord-payload.json "$DISCORD_WEBHOOK_URL"

  # Manual-only: verify the webhook and see how change alerts render.
  test-notification:
    if: ${{ inputs.test_notification }}
    runs-on: ubuntu-latest
    steps:
      - name: Send sample Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set."
            exit 1
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            -d '{"content":"✅ **Test notification** — the PS Plus sync webhook is working. Real change alerts will look like this:","embeds":[{"title":"Grounded PS4® & PS5®","color":28881,"description":"Monthly games · PS4, PS5 · Adventure","url":"https://store.playstation.com/en-us/concept/10008048","thumbnail":{"url":"https://image.api.playstation.com/vulcan/ap/rnd/202404/1120/64a12b89992b8e34ecace3e5c7d1d39b954c2ab1d73de70a.png"}}]}' \
            "$DISCORD_WEBHOOK_URL"
